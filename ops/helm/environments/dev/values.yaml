# Dev environment values

replicaCount: 1

deployApp: false

image:
  repository: ghcr.io/your-org/sie-definition-manager
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  # OTel service identity (ADR-001 D-1). Consumed by templates/_helpers.tpl
  # to build OTEL_RESOURCE_ATTRIBUTES. Whitelist in helper means type/port
  # do NOT leak into the resource-attrs string. service.version is sourced
  # from .Chart.AppVersion in the helper (single source of truth).
  name: sie-definition-manager
  namespace: poesis

# ADR-001 D-1 Implementation hooks (full shape adopted in S-001 so S-003
# does not have to restructure). Keys not yet behaviorally consumed in
# S-001 are kept for forward compatibility.
observability:
  mode: shared-collector # enum: shared-collector | direct | stdout — wired in S-003
  otlp:
    endpoint: http://sie-otel-collector.sie.svc.cluster.local:4317
  sampling:
    headRatio: 1.0 # ADR-001 D-2 keep-all
  payloadCapBytes: 16384 # consumed Sprint-3
  payloadBypassRate: 0.01 # consumed Sprint-3
  tracesSampler: parentbased_always_on
  aop:
    # DEBUG in dev for full AOP visibility (S-004b / ADR-002).
    logLevel: DEBUG
  logs:
    # S-006 / ADR-003 D-2: dual-sink switch. enum: otlp | stdout | both.
    # Default `both` until S-014 lands collector-outage handling, then flips to `otlp`.
    sink: both
  shutdown:
    # S-006 / ADR-003 D-6: graceful shutdown window (seconds) for in-flight
    # OTLP log/span flush before SIGKILL. Drives Pod terminationGracePeriodSeconds.
    gracePeriodSeconds: 30

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: dm.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  DB_URL: jdbc:postgresql://definitiondatabase:5432/sie_definition
  DB_USER: dm_local
  SCHEMA_REGISTRY_URL: http://schemaregistry:8081
  KAFKA_BOOTSTRAP_SERVERS: sie-definition-manager-eventbus:9092
  OIDC_ISSUER_URI: http://localhost:9000/realms/sie
  DM_RELIABILITY_MODE: alo-idempotent
  KAFKA_ENABLE_IDEMPOTENCE: "true"
  KAFKA_TX_ID_PREFIX: dm-tx-

secrets:
  DB_PASSWORD: ""

dbBootstrap:
  enabled: true
  image:
    repository: postgres
    tag: "16.3"
    pullPolicy: IfNotPresent
  adminUser: sie
  adminPassword: ""
  database: sie_definition
  dbUser: dm_local
  dbPassword: ""

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

nodeSelector: {}
tolerations: []
affinity: {}

eventbus:
  replicaCount: 1
  image:
    repository: apache/kafka
    tag: "3.7.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9092
  kraft:
    clusterId: "SIEDMDevKafkaCluster01"
    nodeId: 1
    listeners: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
    advertisedListeners: "PLAINTEXT://sie-definition-manager-eventbus.sie.svc.cluster.local:9092"
    controllerListenerNames: "CONTROLLER"
    listenerSecurityProtocolMap: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
    interBrokerListenerName: "PLAINTEXT"
    controllerQuorumVoters: "1@localhost:9093"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

definitiondatabase:
  nameOverride: ""
  fullnameOverride: ""
  image:
    repository: postgres
    tag: "16.3"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  service:
    type: ClusterIP
    port: 5432
    annotations: {}
  postgres:
    user: sie
    database: sie_definition
    existingSecret: ""
    extensions: []
  secrets:
    DB_PASSWORD: ""
  initdb:
    enabled: true
    extraScripts: {}
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  resources: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

schemaregistry:
  replicaCount: 1
  image:
    repository: confluentinc/cp-schema-registry
    tag: "7.6.0"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""
  serviceAccount:
    create: false
    name: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  service:
    type: ClusterIP
    port: 8081
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: schema-registry.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  kafka:
    bootstrapServers:
      - "PLAINTEXT://sie-definition-manager-eventbus:9092"
  configuration:
    listeners: "http://localhost:8081"
    hostName: "schemaregistry.sie.svc.cluster.local"
    extraEnv:
      SCHEMA_REGISTRY_DISABLE_PREFLIGHT_CHECKS: "true"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: "1"
      SCHEMA_REGISTRY_MASTER_ELIGIBILITY: "true"
      SCHEMA_REGISTRY_MODE: "READWRITE"
      SCHEMA_REGISTRY_GROUP_ID: "schema-registry-sie"
  probes:
    enabled: false
    readinessPath: /subjects
    livenessPath: /subjects
    initialDelaySeconds: 120
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  persistence:
    enabled: false
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ""
    mountPath: /var/lib/schema-registry
  extraVolumes: []
  extraVolumeMounts: []
