{{- if .Values.deployApp }}
{{- include "sie-defman.validateLogsSink" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sie-definition-manager.fullname" . }}
  labels:
    app: {{ include "sie-definition-manager.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "sie-definition-manager.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "sie-definition-manager.fullname" . }}
    spec:
      # ADR-003 D-6: graceful shutdown window for in-flight OTLP log/span
      # flush before SIGKILL. Kubernetes default is 30s; we make it explicit
      # and configurable via observability.shutdown.gracePeriodSeconds so
      # operators can tune per-env (longer in prod if OTLP batch latency
      # observed).
      terminationGracePeriodSeconds: {{ .Values.observability.shutdown.gracePeriodSeconds | default 30 }}
      containers:
        - name: dm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_URL
              value: {{ .Values.env.DB_URL | quote }}
            - name: DB_USER
              value: {{ .Values.env.DB_USER | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sie-definition-manager.fullname" . }}-secret
                  key: DB_PASSWORD
            - name: SCHEMA_REGISTRY_URL
              value: {{ .Values.env.SCHEMA_REGISTRY_URL | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
            - name: OIDC_ISSUER_URI
              value: {{ .Values.env.OIDC_ISSUER_URI | quote }}
            # OTel SDK env vars (S-001 AC-5, S-003 wires mode switch).
            # observability.mode (enum: shared-collector | direct | stdout)
            # selects exporter + endpoint per ADR-001 D-1.
            #   shared-collector → otlp → in-cluster sie-otel-collector
            #   direct           → otlp → customer-provided endpoint (required)
            #   stdout           → logging → app pod stdout (no collector)
            # JAVA_TOOL_OPTIONS is baked into the image (cycle 1 Dockerfile),
            # not set here.
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.service.name | quote }}
            {{- $mode := .Values.observability.mode | default "shared-collector" }}
            {{- if eq $mode "shared-collector" }}
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlp.endpoint | quote }}
            {{- else if eq $mode "direct" }}
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ required "observability.otlp.endpoint is required when observability.mode=direct" .Values.observability.otlp.endpoint | quote }}
            {{- else if eq $mode "stdout" }}
            - name: OTEL_TRACES_EXPORTER
              value: "logging"
            - name: OTEL_LOGS_EXPORTER
              value: "logging"
            {{- else }}
            {{- fail (printf "observability.mode must be one of: shared-collector, direct, stdout (got %q)" $mode) }}
            {{- end }}
            - name: OTEL_TRACES_SAMPLER
              value: {{ .Values.observability.tracesSampler | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "sie-definition-manager.otelResourceAttributes" . | quote }}
            - name: DM_RELIABILITY_MODE
              value: {{ .Values.env.DM_RELIABILITY_MODE | quote }}
            - name: KAFKA_ENABLE_IDEMPOTENCE
              value: {{ .Values.env.KAFKA_ENABLE_IDEMPOTENCE | quote }}
            - name: KAFKA_TX_ID_PREFIX
              value: {{ .Values.env.KAFKA_TX_ID_PREFIX | quote }}
            # S-004b / ADR-002 D-8: AOP broad instrumentation log level.
            - name: OBSERVABILITY_AOP_LOGLEVEL
              value: {{ .Values.observability.aop.logLevel | quote }}
            # S-006 / ADR-003 D-2: dual-sink switch. Enum guard lives in
            # _helpers.tpl (sie-defman.validateLogsSink). Default `both` until
            # S-014 lands collector-outage handling, then flips to `otlp`.
            - name: OBSERVABILITY_LOGS_SINK
              value: {{ .Values.observability.logs.sink | default "both" | quote }}
            # S-006 AC-4 (ADR-003 D-2): pure-yaml stdout suppression. Bridges
            # the sink enum to Spring Boot 3.5's logging.threshold.console
            # property (R-INV-9: no logback-spring.xml). When sink=otlp the
            # CONSOLE appender threshold is OFF (no stdout); otherwise TRACE
            # (default — sink-level filters apply normally).
            {{- $sink := .Values.observability.logs.sink | default "both" }}
            - name: LOGGING_THRESHOLD_CONSOLE
              value: {{ if eq $sink "otlp" }}"OFF"{{ else }}"TRACE"{{ end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
