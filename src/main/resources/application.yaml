server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: sie-definition-manager
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sie_definition}
    username: ${DB_USER:sie}
    password: ${DB_PASSWORD:change-me}
  hateoas:
    use-hal-as-default-json-media-type: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      "[enable.idempotence]": ${KAFKA_ENABLE_IDEMPOTENCE:true}
      "[acks]": all
      "[max.in.flight.requests.per.connection]": 5
      "[delivery.timeout.ms]": 120000
    producer:
      transaction-id-prefix: ${KAFKA_TX_ID_PREFIX:dm-tx-}
    listener:
      ack-mode: record
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:9000/realms/sie}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

springdoc:
  enable-hateoas: true

dm:
  bootstrap:
    archetype-schema-pattern: ${DM_ARCHETYPE_SCHEMA_PATTERN:classpath:statement/*.schema.json}
  messaging:
    reliability-mode: ${DM_RELIABILITY_MODE:alo-idempotent}
  security:
    oauth2-login-enabled: ${DM_OAUTH2_LOGIN_ENABLED:false}

observability:
  aop:
    # S-004b / ADR-002 D-8: single configurable level for AOP entry/exit/exception logs. TRACE|DEBUG|INFO|WARN|ERROR|OFF.
    logLevel: ${OBSERVABILITY_AOP_LOGLEVEL:INFO}
  logs:
    # S-006 / ADR-003 D-2: dual-sink switch. enum: otlp | stdout | both.
    # Default `both` matches Helm defaults until S-014 flips to `otlp`.
    # This property is informational on the app side (Logback wiring is
    # driven by logging.threshold.console below, which Helm computes from
    # the same sink value — see deployment.yaml LOGGING_THRESHOLD_CONSOLE).
    sink: ${OBSERVABILITY_LOGS_SINK:both}

# S-004b QA-blocker B-1: bind the cloud.poesis.sie.defman package-level Logback logger to the
# SAME knob as the aspect's choose-which-SLF4J-method switch. Without this binding, the aspect
# would call logger.debug(...) under DEBUG but Logback would filter it out at INFO (Spring Boot's
# default), so observability.aop.logLevel=DEBUG would emit nothing in production. AC-3 / AC-4
# require a single configurable knob; this propagates the same value to Logback's filter level.
logging:
  structured:
    format:
      # ECS is the Spring Boot 3.5 built-in structured console format we use for stdout JSON.
      # It is not OpenTelemetry log encoding: OTel governs the semantic meaning/correlation fields,
      # while ECS is the JSON envelope rendered to stdout. Alternatives are Boot's GELF and Logstash
      # formats, but ECS is the closest fit for operator-facing structured logs here without adding
      # a third-party encoder dependency.
      console: ecs
  level:
    "[cloud.poesis.sie.defman]": ${observability.aop.logLevel:INFO}
  threshold:
    # S-006 AC-4 (ADR-003 D-2): pure-yaml stdout suppression for sink=otlp.
    # Spring Boot 3.5+ exposes logging.threshold.console (default TRACE) to
    # gate the CONSOLE appender at the framework level — no logback-spring.xml
    # required (R-INV-9). Helm computes LOGGING_THRESHOLD_CONSOLE from
    # observability.logs.sink:
    #   sink=otlp           → OFF   (no stdout)
    #   sink=stdout | both  → TRACE (stdout passes through level filters)
    # Local default TRACE keeps developer `mvn spring-boot:run` behavior
    # unchanged (console on) unless the env var is explicitly set.
    console: ${LOGGING_THRESHOLD_CONSOLE:TRACE}
