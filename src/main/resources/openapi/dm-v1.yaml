openapi: 3.1.0
info:
  title: SIE Definition Manager API
  version: v1
  description: |
    Minimal checked-in bootstrap pointer for the Definition Manager.
    The authoritative API and schema surface is exposed dynamically by GET /openapi.
servers:
  - url: /api/v1
paths:
  /openapi:
    get:
      summary: Dynamic OpenAPI specification endpoint
      operationId: getOpenApi
      responses:
        "200":
          description: OpenAPI 3.1 document generated from active archetype schemas
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500":
          description: Unexpected server error
          content:
            application/problem+json:
              schema:
                type: object
                additionalProperties: true
