# Local environment overlay (non-sensitive values only)

env:
  OIDC_ISSUER_URI: http://localhost:9000/realms/sie
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring.svc.cluster.local:4317

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# Local subchart configurations
eventbus:
  persistence:
    enabled: true
    size: 10Gi

definitiondatabase:
  persistence:
    enabled: true
    size: 20Gi

schemaregistry:
  kafka:
    bootstrapServers:
      - "PLAINTEXT://{{ .Release.Name }}-eventbus:9092"
  probes:
    enabled: false
