{{- if .Values.deployApp }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sie-definition-manager.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "sie-definition-manager.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
{{- end }}
