name: dm-cd

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - aks
          - onprem
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - preprod
          - prod

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build jar
        run: mvn -B -DskipTests package
      - name: Generate SBOM
        run: mvn -B cyclonedx:makeAggregateBom
      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/sie-definition-manager:${{ github.sha }} .
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: docker push ghcr.io/${{ github.repository_owner }}/sie-definition-manager:${{ github.sha }}
      - name: Sign image (keyless)
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign
        run: cosign sign --yes ghcr.io/${{ github.repository_owner }}/sie-definition-manager:${{ github.sha }}
      - name: Set output
        id: meta
        run: echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  prod-deploy:
    if: ${{ github.event.inputs.target == 'aks' }}
    needs: package
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Validate required deploy secret
        run: |
          test -n "${{ secrets.DM_DB_PASSWORD }}" || {
            echo "Missing required environment secret: DM_DB_PASSWORD" >&2
            exit 1
          }
          test -n "${{ secrets.DEF_DB_ADMIN_PASSWORD }}" || {
            echo "Missing required environment secret: DEF_DB_ADMIN_PASSWORD" >&2
            exit 1
          }
      - name: Deploy with Makefile
        run: |
          make prod-deploy \
            DEPLOY_ENV=${{ github.event.inputs.environment }} \
            IMAGE_REPOSITORY=ghcr.io/${{ github.repository_owner }}/sie-definition-manager \
            IMAGE_TAG=${{ needs.package.outputs.image_tag }} \
            DM_DB_PASSWORD=${{ secrets.DM_DB_PASSWORD }} \
            DEF_DB_ADMIN_PASSWORD=${{ secrets.DEF_DB_ADMIN_PASSWORD }}

  deploy-onprem:
    if: ${{ github.event.inputs.target == 'onprem' }}
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package helm chart
        run: make package-helm
      - name: Upload helm package
        uses: actions/upload-artifact@v4
        with:
          name: dm-helm-package
          path: "*.tgz"
