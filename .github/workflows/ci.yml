name: dm-ci

on:
  push:
    paths:
      - "sie/sie-definition-manager/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "sie/sie-definition-manager/**"
      - ".github/workflows/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sie/sie-definition-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: mvn -B verify
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dm-test-reports
          path: |
            sie/sie-definition-manager/target/surefire-reports
            sie/sie-definition-manager/target/site/jacoco
            sie/sie-definition-manager/target/bom.json

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sie/sie-definition-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: OWASP dependency check
        run: mvn -B org.owasp:dependency-check-maven:check
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: sie/sie-definition-manager

  contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sie/sie-definition-manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Validate OpenAPI contract file
        run: test -s src/main/resources/openapi/dm-v1.yaml
